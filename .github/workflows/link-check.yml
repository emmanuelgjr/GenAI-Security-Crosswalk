name: Link check
on:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [main]
jobs:
  linkcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: '--verbose --no-progress **/*.md'
          fail: true
