name: Link check
on:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [main]
jobs:
  linkcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: '--verbose --no-progress **/*.md'
          fail: true
