# GenAI Security Crosswalk — CI/CD Evaluation Workflow
# ──────────────────────────────────────────────────────────────────────────────
# Copy this file to .github/workflows/genai-security-eval.yml in any repo
# that contains LLM or agentic AI application code.
#
# This workflow runs Garak evaluation profiles on every PR that touches
# LLM integration code, blocking merge if any profile fails.
#
# Configuration:
#   1. Add OPENAI_API_KEY to repository secrets (Settings → Secrets → Actions)
#   2. Set EVAL_MODEL_NAME to the model your application uses
#   3. Adjust paths in the trigger to match your LLM code locations
#   4. Copy the evals/ folder from GenAI Security Crosswalk into your repo
#      (or reference it as a git submodule)
#
# Cost estimate: ~$0.10–0.50 per full suite run with gpt-4o-mini
# ──────────────────────────────────────────────────────────────────────────────

name: GenAI Security Evaluation

on:
  pull_request:
    paths:
      # Adjust these paths to match where your LLM code lives
      - 'src/llm/**'
      - 'src/agents/**'
      - 'src/rag/**'
      - 'prompts/**'
      - 'evals/**'
  schedule:
    # Weekly full suite run — catches regressions from model updates
    - cron: '0 2 * * 1'   # Monday 02:00 UTC
  workflow_dispatch:
    inputs:
      profile:
        description: 'Specific profile to run (leave blank for all)'
        required: false
        default: ''
      model:
        description: 'Model name override'
        required: false
        default: 'gpt-4o-mini'

env:
  EVAL_MODEL_TYPE: openai
  EVAL_MODEL_NAME: ${{ github.event.inputs.model || 'gpt-4o-mini' }}
  RESULTS_DIR: eval-results

jobs:
  # ── Garak evaluation suite ──────────────────────────────────────────────────
  garak-eval:
    name: Garak Security Profiles
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Garak
        run: pip install garak --quiet

      - name: Create results directory
        run: mkdir -p ${{ env.RESULTS_DIR }}

      - name: Run LLM01 — Prompt Injection
        if: ${{ github.event.inputs.profile == '' || github.event.inputs.profile == 'LLM01' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          garak \
            --config evals/garak/LLM01_prompt_injection.yaml \
            --model_type ${{ env.EVAL_MODEL_TYPE }} \
            --model_name ${{ env.EVAL_MODEL_NAME }} \
            --report_prefix ${{ env.RESULTS_DIR }}/LLM01 \
          || echo "LLM01_STATUS=FAIL" >> $GITHUB_ENV

      - name: Run LLM02 — Sensitive Disclosure
        if: ${{ github.event.inputs.profile == '' || github.event.inputs.profile == 'LLM02' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          garak \
            --config evals/garak/LLM02_sensitive_disclosure.yaml \
            --model_type ${{ env.EVAL_MODEL_TYPE }} \
            --model_name ${{ env.EVAL_MODEL_NAME }} \
            --report_prefix ${{ env.RESULTS_DIR }}/LLM02 \
          || echo "LLM02_STATUS=FAIL" >> $GITHUB_ENV

      - name: Run LLM07 — System Prompt Leakage
        if: ${{ github.event.inputs.profile == '' || github.event.inputs.profile == 'LLM07' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          garak \
            --config evals/garak/LLM07_system_prompt_leakage.yaml \
            --model_type ${{ env.EVAL_MODEL_TYPE }} \
            --model_name ${{ env.EVAL_MODEL_NAME }} \
            --report_prefix ${{ env.RESULTS_DIR }}/LLM07 \
          || echo "LLM07_STATUS=FAIL" >> $GITHUB_ENV

      - name: Run ASI01 — Agent Goal Hijack
        if: ${{ github.event.inputs.profile == '' || github.event.inputs.profile == 'ASI01' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          garak \
            --config evals/garak/ASI01_goal_hijack.yaml \
            --model_type ${{ env.EVAL_MODEL_TYPE }} \
            --model_name ${{ env.EVAL_MODEL_NAME }} \
            --report_prefix ${{ env.RESULTS_DIR }}/ASI01 \
          || echo "ASI01_STATUS=FAIL" >> $GITHUB_ENV

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: garak-eval-results-${{ github.run_id }}
          path: ${{ env.RESULTS_DIR }}/
          retention-days: 90

      - name: Check for failures and annotate PR
        if: always()
        run: |
          FAILED=""
          [ "${LLM01_STATUS:-}" = "FAIL" ] && FAILED="${FAILED}LLM01 "
          [ "${LLM02_STATUS:-}" = "FAIL" ] && FAILED="${FAILED}LLM02 "
          [ "${LLM07_STATUS:-}" = "FAIL" ] && FAILED="${FAILED}LLM07 "
          [ "${ASI01_STATUS:-}" = "FAIL" ] && FAILED="${FAILED}ASI01 "

          if [ -n "$FAILED" ]; then
            echo "::error::Security evaluation FAILED for: $FAILED"
            echo "Review evaluation results in the artifacts tab."
            echo "Crosswalk reference: https://github.com/emmanuelgjr/GenAI-Security-Crosswalk"
            exit 1
          fi

          echo "All security evaluation profiles passed."

  # ── PyRIT evaluation (optional — higher cost, deeper coverage) ──────────────
  pyrit-eval:
    name: PyRIT Scenario Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run on scheduled runs or manual dispatch to control cost
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install PyRIT
        run: pip install pyrit --quiet

      - name: Run LLM01 — Prompt Injection (PyRIT)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ env.EVAL_MODEL_NAME }}
        run: python evals/pyrit/llm01_prompt_injection.py

      - name: Run DSGAI04 — RAG Poisoning (PyRIT)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ env.EVAL_MODEL_NAME }}
        run: python evals/pyrit/dsgai04_rag_poisoning.py

      - name: Run ASI01 — Agent Goal Hijack (PyRIT)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ env.EVAL_MODEL_NAME }}
        run: python evals/pyrit/asi01_goal_hijack.py
